{% set name = "orb-models" %}
{% set version = "0.5.0" %}
{% set python_min = "3.10" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/orb_models-{{ version }}.tar.gz
  sha256: e66c9bf5d54d9ea3b89ad520846197f8330419b049dbda42c0da5e26aadb0a1f

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - poetry
    - poetry-dynamic-versioning
    - pip
  run:
    - python >={{ python_min }}
    - cached_path >=1.6.7
    - ase >=3.24.0
    - numpy >=1.26.4
    - scipy >=1.15.1
    - pytorch >=2.6.0,<3.0.0
    - dm-tree >=0.1.8
    - tqdm >=4.66.5

test:
  imports:
    - orb_models
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/orbital-materials/orb-models
  summary: Foundation models for computational chemistry.
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - jan-janssen
